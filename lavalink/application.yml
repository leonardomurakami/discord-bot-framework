server:
  port: 2333
  address: 0.0.0.0
  http2:
    enabled: false
spring:
  main:
    banner-mode: log
  datasource:
    hikari:
      maximumPoolSize: 2
logging:
  file:
    path: ./logs/
  level:
    root: INFO
    lavalink: INFO
  logback:
    rollingpolicy:
      max-file-size: 25MB
      max-history: 30
lavalink:
  plugins:
    - dependency: com.github.topi314.lavasrc:lavasrc-plugin:4.8.1
      repository: https://maven.lavalink.dev/releases
      snapshot: false
    - dependency: dev.lavalink.youtube:youtube-plugin:1.18.0
      snapshot: false
  server:
    password: "${LAVALINK_SERVER_PASSWORD:youshallnotpass}"
    sources:
      youtube: false
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      mixer: false
      http: true
      local: false
    filters:
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: true
      rotation: true
      channelMix: true
      lowPass: true
    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    opusEncodingQuality: 10
    resamplingQuality: LOW
    trackStuckThresholdMs: 10000
    useSeekGhosting: true
    youtubePlaylistLoadLimit: 6
    playerUpdateInterval: 5
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: true
    gc-warnings: true
plugins:
  youtube:
    enabled: true
    oauth:
      enabled: true
      refreshToken: ${LAVALINK_YT_OAUTH_REFRESH_TOKEN}
    remoteCipher:
      url: "https://cipher.kikkia.dev/"
      userAgent: "discord-botman"
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      - MUSIC
      - TVHTML5_SIMPLY
      - ANDROID_MUSIC
      - WEBEMBEDDED
      - ANDROID
      - MEDIA_CONNECT
      - TV
      - MWEB
      - IOS
metrics:
  prometheus:
    enabled: false
    endpoint: /metrics
sentry:
  dsn: ""
  environment: ""
